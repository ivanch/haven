apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguardhome-pvc
  namespace: dns
  annotations:
    nfs.io/storage-path: "adguardhome-config"
spec:
  storageClassName: "nfs-client"
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguardhome
  namespace: dns
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: adguardhome
  template:
    metadata:
      labels:
        app: adguardhome
    spec:
      containers:
      - name: adguardhome
        image: adguard/adguardhome:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 53
          protocol: TCP
        - containerPort: 53
          protocol: UDP
        - containerPort: 3000
          protocol: TCP
          name: install-port
        - containerPort: 80
          protocol: TCP
          name: web-port
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: adguardhome-storage
          mountPath: /opt/adguardhome/work
        - name: adguardhome-storage
          mountPath: /opt/adguardhome/conf
      volumes:
      - name: adguardhome-storage
        persistentVolumeClaim:
          claimName: adguardhome-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: adguardhome-svc
  namespace: dns
spec:
  type: LoadBalancer
  selector:
    app: adguardhome
  loadBalancerIP: 192.168.20.200
  ports:
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: web
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: adguardhome-lan-svc
  namespace: dns
spec:
  type: LoadBalancer
  selector:
    app: adguardhome
  loadBalancerIP: 192.168.15.200
  ports:
  - name: dns-tcp
    port: 53
    targetPort: 53
    protocol: TCP
  - name: dns-udp
    port: 53
    targetPort: 53
    protocol: UDP
  - name: web
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: adguard-install-svc
  namespace: dns
spec:
  type: ClusterIP
  selector:
    app: adguardhome
  ports:
  - name: install
    port: 3000
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguardhome-ingress
  namespace: dns
spec:
  ingressClassName: nginx
  rules:
  - host: adguard.haven
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: adguardhome-svc
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adguardhome-install-ingress
  namespace: dns
spec:
  ingressClassName: nginx
  rules:
  - host: install.adguard.haven
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: adguard-install-svc
            port:
              number: 3000
