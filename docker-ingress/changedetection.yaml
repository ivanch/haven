# docker-node: iris.haven
# port: 4100

# Service
apiVersion: v1
kind: Service
metadata:
  name: changedetection-service
  namespace: docker-ingress
spec:
  ports:
    - port: 80
      targetPort: 4100
---
# Endpoints
apiVersion: v1
kind: Endpoints
metadata:
  name: changedetection-service
  namespace: docker-ingress
subsets:
  - addresses:
      - ip: 192.168.15.101
    ports:
      - port: 4100
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: changedetection-ingress
  namespace: docker-ingress
spec:
  rules:
    - host: change.haven
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: changedetection-service
                port:
                  number: 80
