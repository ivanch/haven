apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beszel-agent
  namespace: infra
spec:
  selector:
    matchLabels:
      app: beszel-agent
  template:
    metadata:
      labels:
        app: beszel-agent
    spec:
      hostNetwork: true
      containers:
      - env:
        - name: PORT
          value: "45876"
        - name: KEY
          valueFrom:
            secretKeyRef:
              name: beszel-key
              key: SECRET-KEY
        image: henrygd/beszel-agent:0.12.10
        imagePullPolicy: Always
        name: beszel-agent
        ports:
          - containerPort: 45876
            hostPort: 45876
      restartPolicy: Always